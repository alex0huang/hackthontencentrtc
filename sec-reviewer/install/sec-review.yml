# SecReviewer — drop this file at .github/workflows/sec-review.yml
# Then add ADAL_API_KEY to your repo secrets.
name: SecReviewer

on:
  pull_request:
    branches: [main, master]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install -g @sylphai/adal-cli

      - name: Run SecReviewer
        env:
          ADAL_API_KEY: ${{ secrets.ADAL_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          [ -s pr.diff ] || { echo "No diff"; exit 0; }
          cat pr.diff | adal -q "Senior security engineer reviewing this diff. \
            Find: SQL/XSS/command injection, path traversal, hardcoded secrets, \
            auth flaws, crypto weaknesses, insecure deserialization. \
            Output Markdown with sections: Critical Issues, Warnings, Suggestions, \
            Human Review Needed (YES/NO), Learn More (OWASP links). \
            If clean, output only '✅ No security issues detected.'" \
            --yolo > review.md

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- adal-guard:sec-review -->';
            const review = fs.existsSync('review.md')
              ? fs.readFileSync('review.md', 'utf8')
              : '_No review generated._';
            const sha = (context.payload.pull_request && context.payload.pull_request.head.sha) || context.sha;
            const body = `${MARKER}\n# 🛡️ SecReviewer Report\n\n_Commit: \`${sha.slice(0,7)}\` · Updated: ${new Date().toISOString()}_\n\n${review}\n\n---\n_Powered by [AdaL](https://adalagent.ai)_`;

            // Find existing AdaL comment and edit it; otherwise create a new one.
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            try {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                core.info(`Updated existing AdaL comment #${existing.id}`);
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
                core.info('Created new AdaL comment');
              }
            } catch (err) {
              // Fork PRs grant GITHUB_TOKEN read-only perms → comment write fails.
              // Don't fail the job; surface the review in the logs instead.
              core.warning(`Could not post PR comment (likely a fork PR with read-only token): ${err.message}`);
              core.startGroup('AdaL Security Review (comment fallback)');
              core.info(review);
              core.endGroup();
            }
